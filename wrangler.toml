name = "the-climate-architects"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "public"

# ── Environment Variables ──────────────────────────────────────────
# Set these in Cloudflare Dashboard → Pages → Settings → Environment Variables
# DO NOT put real values here — this file is committed to git
#
#   JWT_SECRET          = "your-long-random-secret"
#   GEMINI_API_KEY      = "your-gemini-api-key"
#   SUPABASE_URL        = "https://xxxx.supabase.co"
#   SUPABASE_SERVICE_KEY = "your-supabase-service-role-key"
#   ALLOWED_ORIGIN      = "https://your-domain.pages.dev"

# ── KV Namespaces (Cloudflare KV — replaces Netlify Blobs) ────────
# After running `wrangler kv:namespace create TCA_KV`, paste the id below
# [[kv_namespaces]]
# binding = "TCA_KV"
# id = "PASTE_YOUR_KV_ID_HERE"
# preview_id = "PASTE_YOUR_KV_PREVIEW_ID_HERE"
